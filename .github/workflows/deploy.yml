name: Deploy to Simply.com

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: 🔨 Install dependencies & Build
      run: |
        npm install
        npm run build
        
    - name: 📂 Sync files to Simply.com
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # Mange webhoteller, inklusive Simply.com, bruger mappen public_html. 
        # Tjek evt. via dit webhotel, hvad din rodmappe hedder, og ret her hvis nødvendigt.
        server-dir: /public_html/
